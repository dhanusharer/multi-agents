# Kisan Saathi - Docker Compose Services
version: "3.9"

services:
  fastmcp_server:
    image: python:3.12-slim
    container_name: kisan-fastmcp-server
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      bash -c "pip install -r requirements.txt &&
               uv run python mcp/kisan_mcp_server.py"
    env_file:
      - .env
    restart: unless-stopped

  api_cache:
    image: python:3.12-slim
    container_name: kisan-api-cache
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    command: >
      bash -c "pip install -r requirements.txt &&
               uvicorn mcp.api_cache:app --host 0.0.0.0 --port 8001"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - fastmcp_server
